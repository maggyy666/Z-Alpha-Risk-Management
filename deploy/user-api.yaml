apiVersion: v1
kind: Service
metadata:
  name: user-api
  namespace: zalpha
spec:
  type: LoadBalancer
  selector: { app: user-api }
  ports:
    - port: 8001
      targetPort: 8001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-api
  namespace: zalpha
spec:
  replicas: 1
  selector:
    matchLabels: { app: user-api }
  template:
    metadata:
      labels: { app: user-api }
    spec:
      containers:
        - name: user-api
          image: zalpha-backend:local
          imagePullPolicy: IfNotPresent
          command: ["uvicorn", "user_api.main:app", "--host", "0.0.0.0", "--port", "8001"]
          ports:
            - containerPort: 8001
          env:
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: zalpha-secrets, key: POSTGRES_PASSWORD } }
            - name: AUTH_SECRET
              valueFrom: { secretKeyRef: { name: zalpha-secrets, key: AUTH_SECRET } }
            - name: DATABASE_URL
              value: postgresql+psycopg2://zalpha:$(POSTGRES_PASSWORD)@postgres:5432/zalpha
          readinessProbe:
            httpGet: { path: /healthz, port: 8001 }
            periodSeconds: 3
