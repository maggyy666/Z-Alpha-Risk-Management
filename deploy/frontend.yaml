apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: zalpha
spec:
  type: LoadBalancer
  selector: { app: frontend }
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: zalpha
spec:
  replicas: 1
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
        - name: frontend
          image: zalpha-frontend:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          # Note: VITE_* vars are baked in at build time (Dockerfile.frontend
          # ARG / ENV). Defaults in src/services/api.ts already point at the
          # local LoadBalancer URLs (http://localhost:8000 / 8001), so no
          # runtime env wiring is required for the default deployment.
          readinessProbe:
            tcpSocket: { port: 3000 }
            periodSeconds: 3
