apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: zalpha
spec:
  type: LoadBalancer
  selector: { app: backend }
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: zalpha
spec:
  replicas: 1
  selector:
    matchLabels: { app: backend }
  template:
    metadata:
      labels: { app: backend }
    spec:
      containers:
        - name: backend
          image: zalpha-backend:local
          imagePullPolicy: IfNotPresent
          command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
          env:
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: zalpha-secrets, key: POSTGRES_PASSWORD } }
            - name: ADMIN_PASSWORD
              valueFrom: { secretKeyRef: { name: zalpha-secrets, key: ADMIN_PASSWORD } }
            - name: USER_PASSWORD
              valueFrom: { secretKeyRef: { name: zalpha-secrets, key: USER_PASSWORD } }
            - name: AUTH_SECRET
              valueFrom: { secretKeyRef: { name: zalpha-secrets, key: AUTH_SECRET } }
            - name: DATABASE_URL
              value: postgresql+psycopg2://zalpha:$(POSTGRES_PASSWORD)@postgres:5432/zalpha
            - name: IBKR_HOST
              value: host.docker.internal
            - name: IBKR_PORT
              value: "7496"
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            periodSeconds: 3
