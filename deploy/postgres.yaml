apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: zalpha
spec:
  selector: { app: postgres }
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: zalpha
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: zalpha
            - name: POSTGRES_DB
              value: zalpha
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: zalpha-secrets, key: POSTGRES_PASSWORD } }
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "zalpha"] }
            periodSeconds: 3
      volumes:
        - name: data
          emptyDir: {}
